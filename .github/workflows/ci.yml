name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Shell Scripts
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n bin/kb-layout-switch-release.sh
